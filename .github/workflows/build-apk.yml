name: Build CallGuard APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3

      - name: Create React Native project
        run: |
          npx @react-native-community/cli@12 init CallGuardApp --version 0.73.0 --skip-install

      - name: Copy source files
        run: |
          cp App.tsx CallGuardApp/App.tsx
          cp package.json CallGuardApp/package.json
          mkdir -p CallGuardApp/src/screens
          mkdir -p CallGuardApp/src/hooks
          cp HomeScreen.tsx CallGuardApp/src/screens/
          cp ContactsScreen.tsx CallGuardApp/src/screens/
          cp RecordScreen.tsx CallGuardApp/src/screens/
          cp SettingsScreen.tsx CallGuardApp/src/screens/
          cp translations.ts CallGuardApp/src/
          cp useCallGuard.ts CallGuardApp/src/hooks/
          PKG=CallGuardApp/android/app/src/main/java/com/callguardapp
          cp CallGuardScreeningService.kt $PKG/
          cp CallGuardModule.kt $PKG/

      - name: Install dependencies
        run: cd CallGuardApp && npm install

      - name: Build APK
        run: |
          cd CallGuardApp/android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: CallGuard-APK
          path: CallGuardApp/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
